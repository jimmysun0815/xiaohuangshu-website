<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <!-- 没有这行的话，访问 /admin/xxx（无斜杠）时浏览器会把 ./js/x.js 解析到错误的路径 -->
    <base href="/admin/" />
    <title>管理后台 · 多人成行</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">多人成行 · Admin</div>
        <nav class="nav-list" aria-label="侧边导航">
          <button class="nav-item" data-tab="overview">概览</button>
          <button class="nav-item" data-tab="presets">棋盘审核</button>
          <button class="nav-item" data-tab="boards">棋盘管理</button>
          <button class="nav-item" data-tab="users">用户</button>
          <button class="nav-item" data-tab="subs">订阅 &amp; 营收</button>
          <button class="nav-item" data-tab="reports">举报</button>
          <button class="nav-item" data-tab="config">App Config</button>
          <button class="nav-item" data-tab="events">RC 事件流</button>
        </nav>
        <div class="sidebar-footer">
          <div class="email" id="currentEmail">—</div>
          <button id="logoutBtn" class="btn">退出登录</button>
        </div>
      </aside>

      <main class="main">
        <header class="page-head">
          <h2 id="pageTitle">概览</h2>
          <div class="actions"></div>
        </header>
        <section id="tabContainer">
          <div class="empty">加载中…</div>
        </section>
      </main>
    </div>

    <!-- 通用模态框（utils.showModal 用） -->
    <div id="modalBackdrop" class="modal-backdrop" role="dialog" aria-modal="true">
      <div class="modal">
        <div class="modal-head">
          <h3 class="modal-title">—</h3>
          <button id="modalClose" class="icon-btn" aria-label="关闭">×</button>
        </div>
        <div class="modal-body"></div>
        <div class="modal-foot"></div>
      </div>
    </div>

    <!-- 自托管，避免大陆访问 jsdelivr 不稳定 -->
    <script src="./vendor/supabase.min.js?v=5"></script>
    <script src="./vendor/chart.umd.min.js?v=5"></script>
    <script src="./js/config.js?v=5"></script>
    <script src="./js/auth.js?v=5"></script>
    <script src="./js/api.js?v=5"></script>
    <script src="./js/charts.js?v=5"></script>
    <!-- 共用：把 preset.data 渲染成可读卡片，presets / boards 两个 tab 共用 -->
    <script src="./js/preset-renderer.js?v=5"></script>

    <script>window.AdminTabs = {};</script>
    <script src="./js/tab-overview.js?v=5"></script>
    <script src="./js/tab-presets.js?v=5"></script>
    <script src="./js/tab-boards.js?v=5"></script>
    <script src="./js/tab-users.js?v=5"></script>
    <script src="./js/tab-subs.js?v=5"></script>
    <script src="./js/tab-reports.js?v=5"></script>
    <script src="./js/tab-config.js?v=5"></script>
    <script src="./js/tab-events.js?v=5"></script>

    <script src="./js/main.js?v=5"></script>
  </body>
</html>
