<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <title>管理员登录 · 多人成行</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="login-shell">
      <div class="login-card">
        <h1>管理员登录</h1>
        <p class="muted">仅限授权账号。</p>

        <div id="reasonBanner" class="error-text" style="display:none;"></div>

        <form id="loginForm">
          <div class="form-row">
            <label for="email">邮箱</label>
            <input
              id="email"
              class="input"
              type="email"
              autocomplete="username"
              placeholder="admin@example.com"
              required
            />
          </div>
          <div class="form-row">
            <label for="password">密码</label>
            <input
              id="password"
              class="input"
              type="password"
              autocomplete="current-password"
              required
            />
          </div>
          <button id="loginBtn" class="btn btn-primary btn-block" type="submit">
            登录
          </button>
          <p id="loginError" class="error-text" style="display:none;"></p>
        </form>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
    <script src="./js/config.js"></script>
    <script src="./js/auth.js"></script>
    <script>
      (async function () {
        const auth = window.AdminAuth;

        // URL 上的 reason= 是从 dashboard 被踢出来时塞的提示
        const params = new URLSearchParams(location.search);
        const reason = params.get("reason");
        if (reason) {
          const b = document.getElementById("reasonBanner");
          b.textContent = decodeURIComponent(reason);
          b.style.display = "block";
        }

        // 已经登录 + 是 admin → 直接进 dashboard
        try {
          const ok = await auth.isAdmin();
          if (ok) {
            location.replace("./dashboard.html");
            return;
          }
        } catch (_) {}

        const form = document.getElementById("loginForm");
        const emailInput = document.getElementById("email");
        const passwordInput = document.getElementById("password");
        const loginBtn = document.getElementById("loginBtn");
        const errBox = document.getElementById("loginError");

        function showError(msg) {
          errBox.textContent = msg;
          errBox.style.display = "block";
        }
        function clearError() {
          errBox.textContent = "";
          errBox.style.display = "none";
        }

        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          clearError();
          const email = emailInput.value.trim().toLowerCase();
          const password = passwordInput.value;
          if (!email || !password) return;

          loginBtn.disabled = true;
          loginBtn.textContent = "登录中…";
          try {
            await auth.signInWithPassword(email, password);
            const ok = await auth.isAdmin();
            if (!ok) {
              await auth.signOut();
              showError(
                "登录成功但该账号不是管理员，已自动登出。请联系超级管理员开通权限。"
              );
              loginBtn.disabled = false;
              loginBtn.textContent = "登录";
              return;
            }
            location.replace("./dashboard.html");
          } catch (err) {
            showError(err?.message || "邮箱或密码错误");
            loginBtn.disabled = false;
            loginBtn.textContent = "登录";
          }
        });
      })();
    </script>
  </body>
</html>
